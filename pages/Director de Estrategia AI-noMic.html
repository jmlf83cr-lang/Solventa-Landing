<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGL - Director de Estrategia AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --bg-color: #050505;
            --accent-color: #00f3ff;
            --accent-dim: rgba(0, 243, 255, 0.1);
            --gold-color: #ffd700; /* Nuevo color para Finanzas */
            --orb-color: #00f3ff;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* FONDO FUTURISTA */
        .background-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        header {
            position: absolute;
            top: 2rem;
            text-align: center;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--accent-dim);
        }
        .subtitle {
            color: var(--accent-color);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ORBE CENTRAL */
        .orb-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .orb {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--orb-color));
            border-radius: 50%;
            box-shadow: 0 0 30px var(--orb-color), 0 0 60px var(--orb-color);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .orb.idle { animation: breathe 4s infinite ease-in-out; }
        .orb.speaking { animation: pulse-speak 0.3s infinite alternate; }
        
        /* Estado Financiero del Orbe */
        .orb.finance {
            background: radial-gradient(circle at 30% 30%, #fff, var(--gold-color));
            box-shadow: 0 0 30px var(--gold-color), 0 0 60px var(--gold-color);
        }

        .wave {
            position: absolute;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            opacity: 0;
            width: 100%;
            height: 100%;
        }
        .orb.speaking ~ .wave { animation: ripple 1.5s infinite linear; }
        .orb.speaking ~ .wave:nth-child(2) { animation-delay: 0.5s; }
        .orb.speaking ~ .wave:nth-child(3) { animation-delay: 1s; }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes pulse-speak { from { transform: scale(1); box-shadow: 0 0 30px var(--orb-color); } to { transform: scale(1.3); box-shadow: 0 0 80px var(--orb-color), 0 0 100px var(--accent-color); } }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; border-width: 2px; } 100% { transform: scale(3); opacity: 0; border-width: 0px; } }

        /* CHART FLOTANTE AVANZADO */
        .chart-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 350px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .chart-container.visible { opacity: 1; }

        /* Grupos de barras para manejar texto encima */
        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            width: 60px;
        }

        .bar {
            width: 100%;
            background: linear-gradient(to top, var(--accent-dim), var(--accent-color));
            box-shadow: 0 0 15px var(--accent-color);
            border-radius: 4px 4px 0 0;
            height: 0;
            transition: height 1.5s cubic-bezier(0.22, 1, 0.36, 1), background 0.5s;
        }

        /* Estilo Modo Financiero (Dorado) */
        .finance-mode .bar {
            background: linear-gradient(to top, rgba(255, 215, 0, 0.1), var(--gold-color));
            box-shadow: 0 0 20px var(--gold-color);
        }

        .bar-label {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--text-color);
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Valor numérico encima de la barra */
        .bar-value {
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .visible .bar-value { opacity: 1; }

        /* LOGO BRANDING */
        .brand-logo-container {
            margin-top: 2rem;
            margin-bottom: 1rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }
        .brand-main {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: linear-gradient(to bottom, #ffffff 40%, #c4c4c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.2));
        }
        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.58em;
            margin-top: 2px;
            margin-left: 5px;
            text-shadow: 0 0 5px var(--accent-dim);
        }

        /* ESTADO Y TRANSCRIPCIÓN */
        .status-text {
            margin-top: 1rem;
            font-size: 1.2rem;
            text-align: center;
            min-height: 1.5em;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 10;
        }

        /* COMANDOS SILENCIOSOS */
        .silent-controls {
            position: absolute;
            bottom: 2rem;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .cmd-btn {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cmd-btn:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }
        
        /* Botón Especial ROI */
        .btn-roi { border-color: var(--gold-color); color: var(--gold-color); }
        .btn-roi:hover { background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 15px var(--gold-color); color: white; background-color: var(--gold-color); }

        /* PANTALLA DE INICIO */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .start-btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 30px var(--accent-color); }
        .hint-text { margin-top: 20px; color: #666; font-size: 0.8rem; }

    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="initSystem()">INICIAR PRESENTACIÓN</button>
        <div class="hint-text">Modo Demo Automática (Sin Micrófono)</div>
    </div>

    <div class="background-grid"></div>

    <header>
        <h1>SEÑOR INVERSIONISTA</h1>
        <div class="subtitle">Director de Estrategia Digital</div>
    </header>

    <div class="chart-container" id="chart">
        <div class="bar-group">
            <span class="bar-value" id="val1"></span>
            <div class="bar" id="bar1"></div>
            <span class="bar-label" id="lbl1">METRICA</span>
        </div>
        <div class="bar-group">
            <span class="bar-value" id="val2"></span>
            <div class="bar" id="bar2"></div>
            <span class="bar-label" id="lbl2">METRICA</span>
        </div>
        <div class="bar-group">
            <span class="bar-value" id="val3"></span>
            <div class="bar" id="bar3"></div>
            <span class="bar-label" id="lbl3">METRICA</span>
        </div>
        <div class="bar-group">
            <span class="bar-value" id="val4"></span>
            <div class="bar" id="bar4"></div>
            <span class="bar-label" id="lbl4">METRICA</span>
        </div>
    </div>

    <div class="orb-container">
        <div class="orb idle" id="orb"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="status-text" id="status">SISTEMA EN ESPERA...</div>

    <div class="brand-logo-container">
        <div class="brand-main">SOLVENTA</div>
        <div class="brand-sub">SOFTWARE</div>
    </div>

    <div class="silent-controls">
        <button class="cmd-btn" onclick="simulateQuestion('competencia')">VS COMPETENCIA</button>
        <button class="cmd-btn" onclick="simulateQuestion('barrera')">¿Y SI TE COPIAN?</button>
        <button class="cmd-btn" onclick="simulateQuestion('premium')">VERSIÓN PREMIUM</button>
        <button class="cmd-btn" onclick="simulateQuestion('dinero')">POR QUÉ INVERTIR</button>
        <button class="cmd-btn btn-roi" onclick="simulateQuestion('roi')">DATA DURA (ROI)</button>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const orb = document.getElementById('orb');
        const statusDiv = document.getElementById('status');
        const chart = document.getElementById('chart');
        let synth = window.speechSynthesis;

        // --- DATOS FINANCIEROS (EDITABLES) ---
        const FINANCIAL_DATA = {
            cac: "$450",    
            ltv: "$12k",    
            margin: "85%",  
            roi: "5x"       
        };

        // --- DISCURSO DE APERTURA (ORIGINAL) ---
        const OPENING_PITCH = "Bienvenido. Soy el Director de Estrategia Digital de Solventa Software. No estoy aquí para mostrarle otro software de registro. Estoy aquí para presentarle el Gobierno Operacional Automatizado. EGL transforma el caos logístico en datos predictivos. Mientras otros ofrecen paneles estáticos, nosotros desplegamos Agentes de IA que garantizan la continuidad operativa y la toma de decisiones autónoma. Conmigo al mando, no solo optimizamos operaciones, escalamos rentabilidad. Estamos construyendo la infraestructura tecnológica que dominará la región. La pregunta es: ¿Está listo para ser parte de la expansión?";

        // --- CEREBRO DEL AGENTE ---
        function simulateQuestion(topic) {
            let text = "";
            let mode = "normal"; // normal | finance
            let chartValues = [];
            let chartLabels = [];

            // Feedback visual inmediato
            statusDiv.innerText = "PROCESANDO CONSULTA...";
            statusDiv.style.color = (topic === 'roi') ? "var(--gold-color)" : "#ff0055";
            orb.className = 'orb listening';

            // Selección de respuesta
            switch(topic) {
                case 'competencia':
                    text = "Buena pregunta. La competencia ofrece herramientas pasivas y aisladas, como un ERP o un WMS tradicional. EGL es un ECOSISTEMA unificado que automatiza la toma de decisiones. No solo registramos datos; gobernamos la operación física, tanto dentro como fuera de su infraestructura. Transformamos la logística en un activo de alto valor estratégico, blindado contra ineficiencias.";
                    chartValues = [30, 50, 80, 100];
                    chartLabels = ["WMS", "ERP", "TMS", "EGL ECOSISTEMA"];
                    break;
case 'barrera': // NUEVA LÓGICA DEFENSA DEEP TECH
                    text = "Esa es la diferencia entre Software y Deep Tech. SAP y Oracle dependen de la nube; viven en ella. EGL nació en el Edge, en el corazón de la bodega. Nuestro proceso offline-first es tecnología propietaria. Para copiarnos, tendrían que reescribir su núcleo desde cero. Nuestra barrera de entrada no es solo código, es arquitectura física.";
                    chartValues = [100, 100, 20, 10];
                    chartLabels = ["EGL", "EDGE", "CLOUD", "RIESGO"];
                    break;
                case 'premium':
                    text = "Esa es la joya de la corona. En la versión Premium, Yo, el Agente IA, tomo el control de los procesos bajo supervisión humana, eliminando riesgos. Genero un cambio drástico en el flujo operativo: lo que en la versión estándar requiere análisis visual en pantalla, conmigo es gestión inmediata. Transformo datos pasivos en respuestas activas.";
                    chartValues = [20, 45, 80, 98];
                    chartLabels = ["MANUAL", "DIGITAL", "HÍBRIDO", "IA AUTO"];
                    break;

                case 'dinero':
    text = "Porque EGL es el brazo aliado y el cerebro operativo. Tenemos una visión de impacto global que integra automatización de procesos y robótica. Convertimos almacenes ciegos y rudimentarios en centros de predicción inteligentes. Con nuestra tecnología Deep Tech, garantizamos la soberanía operativa absoluta.";
    
                 // Gráfico: Valor vs Soberanía
                chartValues = [40, 60, 85, 100];
                chartLabels = ["VALOR", "ROBÓTICA", "PREDICCIÓN", "SOBERANÍA"];
                   break;

                case 'roi': // NUEVA LÓGICA FINANCIERA
                    mode = "finance";
                    text = "Hablemos de retorno. Su inversión está asegurada por una arquitectura de bajo costo y alto margen. Nuestro Costo de Adquisición es de 450 dólares, pero el Valor de Vida del cliente supera los 12,000. Ratio de eficiencia 26 a 1. Margen bruto del 85%. Su dinero escala exponencialmente.";
                    chartValues = [25, 95, 85, 90];
                    chartLabels = ["CAC (Low)", "LTV (High)", "MARGEN", "ROI 3Y"];
                    break;
            }

            // Ejecutar respuesta tras pequeño delay
            setTimeout(() => {
                updateChart(chartValues, chartLabels, mode);
                speak(text, mode);
            }, 800);
        }

        // --- ACTUALIZACIÓN DE GRÁFICOS (HÍBRIDA) ---
        function updateChart(values, labels, mode) {
            // Resetear clases
            chart.classList.remove('visible');
            chart.classList.remove('finance-mode');
            
            setTimeout(() => {
                // Aplicar modo financiero si corresponde
                if(mode === 'finance') chart.classList.add('finance-mode');
                
                for(let i=0; i<4; i++) {
                    // Actualizar Barras
                    const bar = document.getElementById(`bar${i+1}`);
                    const lbl = document.getElementById(`lbl${i+1}`);
                    const val = document.getElementById(`val${i+1}`);

                    bar.style.height = values[i] + '%';
                    lbl.innerText = labels[i];
                    
                    // Mostrar valores numéricos solo en modo finanzas
                    if (mode === 'finance') {
                        let displayVal = "";
                        if(i==0) displayVal = FINANCIAL_DATA.cac;
                        if(i==1) displayVal = FINANCIAL_DATA.ltv;
                        if(i==2) displayVal = FINANCIAL_DATA.margin;
                        if(i==3) displayVal = FINANCIAL_DATA.roi;
                        val.innerText = displayVal;
                        val.style.opacity = 1;
                    } else {
                        val.innerText = "";
                        val.style.opacity = 0;
                    }
                }
                chart.classList.add('visible');
            }, 500);

            // Ocultar gráfico después de 12 segundos
            setTimeout(() => {
                 // chart.classList.remove('visible'); // Opcional: dejar fijo o quitar comentario para ocultar
            }, 12000);
        }

        // --- SÍNTESIS DE VOZ ---
        function speak(text, mode = "normal") {
            if (synth.speaking) { synth.cancel(); }

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'es-ES';
            utterThis.rate = 1.05;
            utterThis.pitch = 0.9;

            const voices = synth.getVoices();
            const esVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google')); 
            if (esVoice) utterThis.voice = esVoice;

            utterThis.onstart = () => {
                orb.className = 'orb speaking';
                if(mode === 'finance') orb.classList.add('finance'); // Cambiar color orbe
                
                statusDiv.innerText = "AGENTE PRESENTANDO...";
                statusDiv.style.color = (mode === 'finance') ? "var(--gold-color)" : "#fff";
                
                // Si es el pitch inicial, mostrar un gráfico genérico
                if(text.includes('futuro')) updateChart([50, 60, 80, 95], ["VISIBILIDAD", "DECISIÓN", "CONTROL", "FUTURO"], "normal");
            };

            utterThis.onend = () => {
                orb.className = 'orb idle'; // Reset total
                statusDiv.innerText = "ESPERANDO COMANDO...";
                statusDiv.style.color = "var(--accent-color)";
            };

            synth.speak(utterThis);
        }

        // --- INICIALIZACIÓN ---
        function initSystem() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);

            setTimeout(() => {
                speak(OPENING_PITCH);
            }, 1000);
        }

    </script>
    <!-- System Protection Script -->
    <script>
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('keydown', function (e) {
            if (e.keyCode == 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode == 85) { e.preventDefault(); return false; }
        });
    </script>
</body>
</html>
