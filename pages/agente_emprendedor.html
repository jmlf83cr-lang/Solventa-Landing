<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGL - Programa de Aceleración</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg-color: #080c14;
            --accent-color: #00e676; /* Verde Esperanza / Crecimiento */
            --accent-dim: rgba(0, 230, 118, 0.1);
            --gold-color: #ffd700;
            --orb-color: #00e676;
            --text-color: #f0f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* FONDO */
        .background-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(600px) rotateX(60deg);
            top: -40%;
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        header { position: absolute; top: 2rem; text-align: center; z-index: 10; }
        h1 { margin: 0; font-weight: 700; letter-spacing: 0.1em; color: white; font-size: 2.5rem; }
        .subtitle { color: var(--accent-color); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }

        /* CHART FLOTANTE */
        .chart-container {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 650px; height: 320px;
            display: flex; align-items: flex-end; justify-content: space-around;
            z-index: 5; opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
        }
        .chart-container.visible { opacity: 1; }

        .bar-group { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; width: 70px; }

        .bar {
            width: 100%;
            background: linear-gradient(to top, var(--accent-dim), var(--accent-color));
            box-shadow: 0 0 15px var(--accent-color);
            border-radius: 6px 6px 0 0;
            height: 0;
            transition: height 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Modo "Oferta/Regalo" (Dorado) */
        .finance-mode .bar {
            background: linear-gradient(to top, rgba(255, 215, 0, 0.1), var(--gold-color));
            box-shadow: 0 0 20px var(--gold-color);
        }

        .bar-label { margin-top: 15px; font-size: 0.9rem; color: #ccc; font-weight: bold; text-align: center; }
        .bar-value { margin-bottom: 10px; font-size: 1.2rem; font-weight: bold; color: white; opacity: 0; transition: opacity 0.5s; }
        .visible .bar-value { opacity: 1; }

        /* ORBE */
        .orb-container { position: relative; width: 160px; height: 160px; display: flex; justify-content: center; align-items: center; z-index: 20; }
        .orb {
            width: 90px; height: 90px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--orb-color));
            border-radius: 50%;
            box-shadow: 0 0 30px var(--orb-color), 0 0 60px var(--orb-color);
            transition: all 0.3s ease;
        }
        .orb.finance { background: radial-gradient(circle at 30% 30%, #fff, var(--gold-color)); box-shadow: 0 0 30px var(--gold-color), 0 0 60px var(--gold-color); }
        .orb.idle { animation: breathe 4s infinite ease-in-out; }
        .orb.speaking { animation: pulse-speak 0.3s infinite alternate; }
        
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes pulse-speak { from { transform: scale(1); } to { transform: scale(1.15); } }

        /* BRANDING */
        .brand-logo-container { margin-top: 2rem; margin-bottom: 1.5rem; z-index: 10; display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .brand-main {
            font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 2.5rem; color: white;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .brand-sub {
            font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 1rem; color: var(--accent-color);
            letter-spacing: 0.4em; margin-top: 5px; margin-left: 5px;
        }

        /* ESTADO */
        .status-text { margin-top: 1rem; font-size: 1.1rem; text-align: center; min-height: 1.5em; color: #888; font-weight: 600; z-index: 10; }

        /* BOTONES */
        .silent-controls { position: absolute; bottom: 2.5rem; display: flex; gap: 15px; z-index: 100; flex-wrap: wrap; justify-content: center; }
        .cmd-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #444; color: #ccc;
            padding: 12px 24px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase; border-radius: 4px;
        }
        .cmd-btn:hover { background: var(--accent-color); color: #080c14; border-color: var(--accent-color); box-shadow: 0 0 20px var(--accent-color); transform: translateY(-2px); }
        
        /* Botón destacado */
        .btn-roi { border-color: var(--gold-color); color: var(--gold-color); }
        .btn-roi:hover { background: var(--gold-color); color: #000; box-shadow: 0 0 20px var(--gold-color); }

        /* OVERLAY INICIO */
        #start-overlay { position: fixed; inset: 0; background: rgba(8, 12, 20, 0.98); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .start-btn {
            background: transparent; border: 2px solid var(--accent-color); color: var(--accent-color);
            padding: 18px 50px; font-size: 1.3rem; font-weight: bold; font-family: 'Montserrat';
            cursor: pointer; transition: 0.3s; border-radius: 50px;
        }
        .start-btn:hover { background: var(--accent-color); color: #080c14; box-shadow: 0 0 40px var(--accent-color); transform: scale(1.05); }

    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="initSystem()">SOLICITAR BENEFICIO</button>
        <div style="margin-top: 20px; color: #666; font-size: 0.9rem;">Programa de Aceleración EGL</div>
    </div>

    <div class="background-grid"></div>

    <header>
        <h1>SOCIOS EN EL ÉXITO</h1>
        <div class="subtitle">Programa de Apoyo al Emprendedor</div>
    </header>

    <div class="chart-container" id="chart">
        <div class="bar-group">
            <span class="bar-value" id="val1"></span>
            <div class="bar" id="bar1"></div>
            <span class="bar-label" id="lbl1"></span>
        </div>
        <div class="bar-group">
            <span class="bar-value" id="val2"></span>
            <div class="bar" id="bar2"></div>
            <span class="bar-label" id="lbl2"></span>
        </div>
        <div class="bar-group">
            <span class="bar-value" id="val3"></span>
            <div class="bar" id="bar3"></div>
            <span class="bar-label" id="lbl3"></span>
        </div>
        <div class="bar-group">
            <span class="bar-value" id="val4"></span>
            <div class="bar" id="bar4"></div>
            <span class="bar-label" id="lbl4"></span>
        </div>
    </div>

    <div class="orb-container">
        <div class="orb idle" id="orb"></div>
    </div>

    <div class="status-text" id="status">ANALIZANDO POTENCIAL...</div>

    <div class="brand-logo-container">
        <div class="brand-main">SOLVENTA</div>
        <div class="brand-sub">SOFTWARE</div>
    </div>

    <div class="silent-controls">
        <button class="cmd-btn" onclick="ask('precio')">1. ¿CUÁL ES EL PRECIO?</button>
        <button class="cmd-btn" onclick="ask('truco')">2. ¿DÓNDE ESTÁ EL TRUCO?</button>
        <button class="cmd-btn" onclick="ask('funcionalidad')">3. ¿QUÉ INCLUYE?</button>
        <button class="cmd-btn btn-roi" onclick="ask('acepto')">4. QUIERO EMPEZAR</button>
    </div>

    <script>
        const orb = document.getElementById('orb');
        const statusDiv = document.getElementById('status');
        const chart = document.getElementById('chart');
        let synth = window.speechSynthesis;

        // --- DISCURSO DE APERTURA (FILÁNTROPO PERO EJECUTIVO) ---
        const OPENING_PITCH = "Hola. Soy el Agente de Crecimiento de EGL. Sabemos que iniciar es difícil y que el flujo de caja es vital. Por eso, no quiero venderle nada hoy. Vengo a ofrecerle una alianza. Queremos darle toda la potencia tecnológica de nuestra empresa media, totalmente gratis por un año. Usted pone el esfuerzo, nosotros ponemos la infraestructura.";

        // --- CEREBRO DEL AGENTE (FILÁNTROPO) ---
        function ask(topic) {
            let text = "";
            let mode = "normal";
            let chartValues = [];
            let chartLabels = [];
            let displayValues = [];

            statusDiv.innerText = "CALCULANDO BENEFICIO...";
            statusDiv.style.color = (topic === 'acepto') ? "var(--gold-color)" : "var(--accent-color)";
            orb.className = 'orb listening';

            switch(topic) {
                case 'precio': // LA OFERTA
                    mode = "finance";
                    text = "Cero costo operativo por 12 meses. Sí, cero. Le entrego las llaves de nuestro sistema completo sin factura. Después del año, y solo si su negocio ha sobrevivido y crecido, la tarifa será de 49 dólares mensuales. Es nuestra inversión de riesgo en su éxito.";
                    chartValues = [100, 5, 5, 40];
                    chartLabels = ["VALOR", "COSTO 1Y", "RIESGO", "FUTURO"];
                    displayValues = ["ALTO", "$0", "NULO", "$49"];
                    break;

                case 'truco': // POR QUÉ LO HACEN
                    text = "No hay letra chica, hay estrategia. Creemos en el karma empresarial. Si su negocio despega usando EGL, usted será nuestro cliente leal para siempre. Preferimos apostar por su futuro hoy, que cobrarle una factura que frene su crecimiento. Ganamos cuando usted gana.";
                    chartValues = [20, 80, 95, 100];
                    chartLabels = ["OTROS", "NOSOTROS", "CONFIANZA", "SOCIEDAD"];
                    displayValues = ["Cobran", "Apoyan", "Alta", "100%"];
                    break;

                case 'funcionalidad': // QUÉ INCLUYE (TODO LO DE MEDIA)
                    text = "Obtendrá el paquete de expansión: Multi-bodega, reportes avanzados, 5 usuarios. Queremos que tenga las mejores armas para competir con los grandes desde el día uno, le deseamos éxito.";
                    chartValues = [100, 100, 100, 100];
                    chartLabels = ["MULTI", "REPORTES", "USUARIOS", "SOPORTE"];
                    displayValues = ["SÍ", "SÍ", "5", "SÍ"];
                    break;

                case 'acepto': // CIERRE
                    mode = "finance";
                    text = "Sabia decisión. Ha asegurado su ventaja competitiva. Bienvenido a la familia EGL. Comencemos a construir su imperio ahora mismo. Por favor, haga clic en el botón de registro para activar su año de gracia.";
                    chartValues = [10, 30, 60, 100];
                    chartLabels = ["HOY", "MES 3", "MES 6", "AÑO 1"];
                    displayValues = ["Inicio", "Orden", "Control", "Éxito"];
                    break;
            }

            setTimeout(() => {
                updateChart(chartValues, chartLabels, displayValues, mode);
                speak(text, mode);
            }, 800);
        }

        function updateChart(values, labels, displayVals, mode) {
            chart.classList.remove('visible');
            chart.classList.remove('finance-mode');
            
            setTimeout(() => {
                if(mode === 'finance') chart.classList.add('finance-mode');
                
                for(let i=0; i<4; i++) {
                    const bar = document.getElementById(`bar${i+1}`);
                    const lbl = document.getElementById(`lbl${i+1}`);
                    const val = document.getElementById(`val${i+1}`);

                    bar.style.height = values[i] + '%';
                    lbl.innerText = labels[i];
                    val.innerText = displayVals[i];
                    val.style.opacity = 1;
                }
                chart.classList.add('visible');
            }, 300);
            
            setTimeout(() => { chart.classList.remove('visible'); }, 12000);
        }

         // --- SÍNTESIS DE VOZ ---
        function speak(text, mode = "normal") {
            if (synth.speaking) { synth.cancel(); }

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'es-ES';
            utterThis.rate = 1.05;
            utterThis.pitch = 0.9;

            const voices = synth.getVoices();
            const esVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google')); 
            if (esVoice) utterThis.voice = esVoice;


            utterThis.onstart = () => {
                orb.className = 'orb speaking';
                if(mode === 'finance') orb.classList.add('finance');
                statusDiv.innerText = "AGENTE PRESENTANDO...";
                statusDiv.style.color = (mode === 'finance') ? "var(--gold-color)" : "#fff";
            };

            utterThis.onend = () => {
                orb.className = 'orb idle';
                statusDiv.innerText = "ESPERANDO CONFIRMACIÓN";
                statusDiv.style.color = "#888";
            };

            synth.speak(utterThis);
        }

        function initSystem() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            setTimeout(() => { speak(OPENING_PITCH); }, 800);
        }
    </script>
    <!-- System Protection Script -->
    <script>
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('keydown', function (e) {
            if (e.keyCode == 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode == 85) { e.preventDefault(); return false; }
        });
    </script>
</body>
</html>
