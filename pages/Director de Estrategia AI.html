<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGL - Director de Estrategia AI</title>
    <style>
        /* Importamos Rajdhani para la UI y Montserrat para el LOGO */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --bg-color: #050505;
            --accent-color: #00f3ff;
            --accent-dim: rgba(0, 243, 255, 0.1);
            --orb-color: #00f3ff;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* FONDO FUTURISTA */
        .background-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        header {
            position: absolute;
            top: 2rem;
            text-align: center;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--accent-dim);
        }
        .subtitle {
            color: var(--accent-color);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* EL ORBE CENTRAL (Voz UI) */
        .orb-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .orb {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--orb-color));
            border-radius: 50%;
            box-shadow: 0 0 30px var(--orb-color), 0 0 60px var(--orb-color);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .orb.idle { animation: breathe 4s infinite ease-in-out; }
        .orb.listening { background: radial-gradient(circle at 30% 30%, #fff, #ff0055); box-shadow: 0 0 30px #ff0055, 0 0 60px #ff0055; transform: scale(1.1); }
        .orb.speaking { animation: pulse-speak 0.3s infinite alternate; }

        .wave {
            position: absolute;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            opacity: 0;
            width: 100%;
            height: 100%;
        }
        .orb.speaking ~ .wave { animation: ripple 1.5s infinite linear; }
        .orb.speaking ~ .wave:nth-child(2) { animation-delay: 0.5s; }
        .orb.speaking ~ .wave:nth-child(3) { animation-delay: 1s; }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes pulse-speak { from { transform: scale(1); box-shadow: 0 0 30px var(--orb-color); } to { transform: scale(1.3); box-shadow: 0 0 80px var(--orb-color), 0 0 100px var(--accent-color); } }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; border-width: 2px; } 100% { transform: scale(3); opacity: 0; border-width: 0px; } }

        /* EFECTO WOW: CHART FLOTANTE */
        .chart-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            z-index: 5;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }
        .chart-container.visible { opacity: 1; }

        .bar {
            width: 40px;
            background: linear-gradient(to top, var(--accent-dim), var(--accent-color));
            box-shadow: 0 0 15px var(--accent-color);
            border-radius: 4px 4px 0 0;
            height: 0;
            transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .bar::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-color);
        }

        /* TEXTO DE ESTADO */
        .status-text {
            margin-top: 3rem;
            font-size: 1.2rem;
            text-align: center;
            min-height: 1.5em;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 10;
        }
        
        .transcript {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #666;
            max-width: 600px;
            text-align: center;
            font-style: italic;
        }

        /* --- ESTILOS DEL LOGO BRANDING (REEMPLAZO DE IMAGEN) --- */
        .brand-logo-container {
            margin-top: 2rem;
            margin-bottom: 1rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        .brand-main {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800; /* Extra Bold */
            font-size: 2.2rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            /* Sutil gradiente para dar efecto metálico/moderno */
            background: linear-gradient(to bottom, #ffffff 40%, #c4c4c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.2));
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.58em; /* Espaciado amplio característico */
            margin-top: 2px;
            margin-left: 5px; /* Pequeño ajuste óptico */
            text-shadow: 0 0 5px var(--accent-dim);
        }

        /* INSTRUCCIONES */
        .instructions {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            color: #555;
            z-index: 10;
        }
        .key {
            border: 1px solid #555;
            padding: 2px 8px;
            border-radius: 4px;
            color: #888;
        }

        /* PANTALLA DE INICIO */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .start-btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 30px var(--accent-color); }

    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="initSystem()">INICIAR SISTEMA EGL</button>
    </div>

    <div class="background-grid"></div>

    <header>
        <h1>EGL INVESTOR AI</h1>
        <div class="subtitle">Director de Estrategia Digital</div>
    </header>

    <div class="chart-container" id="wowChart">
        <div class="bar" data-label="VISIBILIDAD" style="height: 0%" id="bar1"></div>
        <div class="bar" data-label="DECISIÓN" style="height: 0%" id="bar2"></div>
        <div class="bar" data-label="RENTABILIDAD" style="height: 0%" id="bar3"></div>
        <div class="bar" data-label="VELOCIDAD" style="height: 0%" id="bar4"></div>
    </div>

    <div class="orb-container">
        <div class="orb idle" id="orb"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="status-text" id="status">SISTEMA EN ESPERA...</div>
    <div class="transcript" id="transcript"></div>

    <div class="brand-logo-container">
        <div class="brand-main">SOLVENTA</div>
        <div class="brand-sub">SOFTWARE</div>
    </div>

    <div class="instructions">
        Mantén presionada la tecla <span class="key">ESPACIO</span> para hablar
    </div>

    <script>
        // --- CONFIGURACIÓN DEL SISTEMA ---
        const orb = document.getElementById('orb');
        const statusDiv = document.getElementById('status');
        const transcriptDiv = document.getElementById('transcript');
        const chartContainer = document.getElementById('wowChart');

        // Variables de Voz
        let recognition;
        let synth = window.speechSynthesis;
        let isListening = false;

        // --- BASE DE CONOCIMIENTO (SIMULACIÓN PROMPT) ---
        function getAgentResponse(input) {
            const text = input.toLowerCase();
            
            if (text.includes('competencia') || text.includes('otros software') || text.includes('wms') || text.includes('erp')) {
                return "Buena pregunta. Otros ofrecen herramientas aisladas como un doble-ve-eme-ese o un erp. EGL ofrece un ECOSISTEMA unificado que toma decisiones por ti. No registramos datos, gobernamos la operación.";
            }
            if (text.includes('problema') || text.includes('caos') || text.includes('por qué')) {
                return "El problema es el caos logístico y las decisiones lentas. EGL unifica lo interno y lo externo. Con nuestro Panel de Control Logístico, tienes visibilidad total en tiempo real de recepción, picking y despacho en un solo clic.";
            }
            if (text.includes('premium') || text.includes('futuro') || text.includes('ia')) {
                return "Esa es la joya de la corona. En la versión Premium, Yo, el Agente, tomo el control de los procesos bajo supervisión humana. Acelero el ritmo de la empresa drásticamente mediante automatización supervisada.";
            }
            if (text.includes('dinero') || text.includes('invertir') || text.includes('vale la pena')) {
                return "Porque EGL no es solo un software de inventario, es un cerebro operativo. Convertimos almacenes ciegos en centros de predicción inteligentes. Con EGL, sus clientes dominan su mercado.";
            }
            if (text.includes('gráficos') || text.includes('estadísticas') || text.includes('números') || text.includes('datos')) {
                triggerWowEffect();
                return "Por supuesto. Aquí tiene la proyección de eficiencia. Observe cómo la velocidad de decisión y la rentabilidad se disparan al eliminar la fricción técnica. Mis detectores de productos estrella optimizan esto automáticamente.";
            }
            return "Soy el Director de Estrategia de EGL. Estoy aquí para demostrarle cómo transformamos el caos en control total. ¿Qué desea saber sobre nuestra rentabilidad o tecnología?";
        }

        // --- INICIALIZACIÓN ---
        function initSystem() {
            document.getElementById('start-overlay').style.display = 'none';
            
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onstart = () => {
                    isListening = true;
                    orb.className = 'orb listening';
                    statusDiv.innerText = "ESCUCHANDO...";
                    statusDiv.style.color = "#ff0055";
                    transcriptDiv.innerText = "";
                };

                recognition.onend = () => {
                    isListening = false;
                    if (!synth.speaking) {
                        orb.className = 'orb idle';
                        statusDiv.innerText = "SISTEMA EN ESPERA...";
                        statusDiv.style.color = "var(--accent-color)";
                    }
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    transcriptDiv.innerText = `User: "${transcript}"`;
                    const response = getAgentResponse(transcript);
                    speak(response);
                };

            } else {
                alert("Tu navegador no soporta Web Speech API. Por favor usa Chrome o Edge.");
            }

            setTimeout(() => {
                speak("Bienvenido. Soy el núcleo de EGL. ¿Cómo puedo ayudarle a decidir su inversión hoy?");
            }, 500);
        }

        // --- SÍNTESIS DE VOZ ---
        function speak(text) {
            if (synth.speaking) { console.error('Ya está hablando'); return; }

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'es-ES';
            utterThis.rate = 1.0;
            utterThis.pitch = 0.9;

            const voices = synth.getVoices();
            const esVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google')); 
            if (esVoice) utterThis.voice = esVoice;

            utterThis.onstart = () => {
                orb.className = 'orb speaking';
                statusDiv.innerText = "AGENTE RESPONDIENDO";
                statusDiv.style.color = "#fff";
                if(text.includes('proyección')) triggerWowEffect();
            };

            utterThis.onend = () => {
                orb.className = 'orb idle';
                statusDiv.innerText = "SISTEMA EN ESPERA...";
                statusDiv.style.color = "var(--accent-color)";
            };

            synth.speak(utterThis);
        }

        // --- EFECTO WOW ---
        function triggerWowEffect() {
            chartContainer.classList.add('visible');
            setTimeout(() => { document.getElementById('bar1').style.height = '60%'; }, 100);
            setTimeout(() => { document.getElementById('bar2').style.height = '85%'; }, 300);
            setTimeout(() => { document.getElementById('bar3').style.height = '95%'; }, 500);
            setTimeout(() => { document.getElementById('bar4').style.height = '90%'; }, 700);

            setTimeout(() => {
                document.getElementById('bar1').style.height = '0%';
                document.getElementById('bar2').style.height = '0%';
                document.getElementById('bar3').style.height = '0%';
                document.getElementById('bar4').style.height = '0%';
                chartContainer.classList.remove('visible');
            }, 8000);
        }

        // --- CONTROL TECLADO ---
        document.body.onkeydown = function(e) {
            if (e.code === 'Space' && !isListening && !synth.speaking) {
                recognition.start();
            }
        }
    </script>
    <!-- System Protection Script -->
    <script>
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('keydown', function (e) {
            if (e.keyCode == 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode == 85) { e.preventDefault(); return false; }
        });
    </script>
</body>
</html>
